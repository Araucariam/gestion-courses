<!DOCTYPE html>

  <meta charset="UTF-8" />

    content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Courses" />

  <title>Gestion de Courses</title>

  <!-- ── Base URL dynamique pour GitHub Pages ───────────────── -->
  <script>
    // Détecter si on est sur GitHub Pages ou domaine custom
    (function () {
      const hostname = location.hostname;
      const pathname = location.pathname;

      // GitHub Pages : username.github.io/repo-name/
      const isGitHubPages = hostname.endsWith('github.io');

      if (isGitHubPages) {
        // Extraire le nom du repo depuis le path
        // ex: /gestion-courses/ → base = /gestion-courses/
        const parts = pathname.split('/').filter(Boolean);
        window.__BASE_PATH__ = parts.length > 0 ? '/' + parts[0] + '/' : '/';
      } else {
        // Netlify, Vercel, domaine custom → racine
        window.__BASE_PATH__ = '/';
      }

      console.info('[App] BASE_PATH:', window.__BASE_PATH__);
    })();
  </script>

  <!-- ── Manifest avec chemin dynamique ─────────────────────── -->
  <script>
    // Injecter le bon lien manifest selon l'environnement
    (function () {
      const base = window.__BASE_PATH__ || '/';
      const link = document.createElement('link');
      link.rel  = 'manifest';
      link.href = base + 'manifest.json';
      document.head.appendChild(link);

      // Apple touch icon
      const apple = document.createElement('link');
      apple.rel  = 'apple-touch-icon';
      apple.href = base + 'assets/icons/icon-192.png';
      document.head.appendChild(apple);

      // Favicon
      const favicon = document.createElement('link');
      favicon.rel  = 'icon';
      favicon.type = 'image/svg+xml';
      favicon.href = base + 'assets/icons/favicon.svg';
      document.head.appendChild(favicon);
    })();
  </script>

  <!-- ── Restaurer l'URL après redirection 404 GitHub Pages ──── -->
  <script>
    (function () {
      // Récupérer le paramètre ?p= injecté par 404.html
      var search = window.location.search;
      if (search && search.startsWith('?p=')) {
        var decoded = decodeURIComponent(search.slice(3));
        // Séparer path et query string
        var parts = decoded.split('&');
        var path  = parts[0] || '';
        var query = parts.slice(1).join('&');
  
        var base  = window.__BASE_PATH__ || '/';
        var newUrl = base + path + (query ? '?' + query : '');
  
        // Remplacer l'URL sans recharger
        window.history.replaceState(null, '', newUrl);
        console.info('[SPA] URL restaurée:', newUrl);
      }
    })();
  </script>

  <!-- ── Splash screen inline ───────────────────────────────── -->
  <style>
    #app-splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: oklch(98% 0.005 250);
      z-index: 99999;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    [data-theme="dark"] #app-splash {
      background: oklch(12% 0.012 250);
    }
    #app-splash.splash--hidden {
      opacity: 0;
      transform: scale(1.04);
      pointer-events: none;
    }
    .splash__content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: splash-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    @keyframes splash-in {
      from { opacity: 0; transform: scale(0.8) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .splash__icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg,
        oklch(55% 0.22 250), oklch(60% 0.2 290));
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px oklch(55% 0.22 250 / 0.4);
      animation: splash-pulse 1.5s ease-in-out 0.3s infinite;
    }
    @keyframes splash-pulse {
      0%,100% { box-shadow: 0 8px 32px oklch(55% 0.22 250 / 0.4); }
      50%      { box-shadow: 0 8px 48px oklch(55% 0.22 250 / 0.65); }
    }
    .splash__icon .material-symbols-rounded {
      font-family: 'Material Symbols Rounded', sans-serif;
      font-size: 40px;
      color: white;
      font-variation-settings: 'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 40;
    }
    .splash__title {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: oklch(18% 0.02 250);
      letter-spacing: -0.02em;
    }
    [data-theme="dark"] .splash__title {
      color: oklch(94% 0.008 250);
    }
    .splash__loader {
      width: 120px;
      height: 3px;
      background: oklch(88% 0.01 250);
      border-radius: 9999px;
      overflow: hidden;
      position: relative;
    }
    [data-theme="dark"] .splash__loader {
      background: oklch(28% 0.018 250);
    }
    .splash__loader-bar {
      position: absolute;
      top: 0; bottom: 0; left: 0;
      width: 40%;
      background: linear-gradient(90deg,
        oklch(55% 0.22 250), oklch(60% 0.2 290));
      border-radius: 9999px;
      animation: splash-progress 1.2s ease-in-out infinite;
    }
    @keyframes splash-progress {
      0%   { left: -40%; }
      100% { left: 100%; }
    }
    @media (prefers-color-scheme: dark) {
      html:not([data-theme="light"]) #app-splash {
        background: oklch(12% 0.012 250);
      }
      html:not([data-theme="light"]) .splash__title {
        color: oklch(94% 0.008 250);
      }
    }
  </style>
</head>

<body>

  <div id="app-root">
    <!-- Splash screen -->
    <div id="app-splash" aria-hidden="true">
      <div class="splash__content">
        <div class="splash__icon">
          <span class="material-symbols-rounded">shopping_basket</span>
        </div>
        <h1 class="splash__title">Gestion de Courses</h1>
        <div class="splash__loader">
          <div class="splash__loader-bar"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Thème immédiat (avant CSS) ─────────────────────────── -->
  <script>
    (function () {
      try {
        const s = JSON.parse(localStorage.getItem('gc_settings') || '{}');
        const theme = s.theme || 'light';
        if (theme === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else if (theme === 'auto') {
          const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', dark ? 'dark':'light');
        }
        if (s.compactMode) {
          document.documentElement.classList.add('compact-mode');
        }
      } catch (e) {}
    })();
  </script>

  <!-- ── Enregistrement SW avec bon scope ───────────────────── -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const base = window.__BASE_PATH__ || '/';
          const reg  = await navigator.serviceWorker.register(
            base + 'sw.js',
            { scope: base }
          );
          console.info('[SW] Enregistré — scope:', reg.scope);
        } catch (e) {
          console.warn('[SW] Erreur enregistrement:', e.message);
        }
      });
    }
  </script>

  <!-- ── Masquer splash quand prêt ──────────────────────────── -->
  <script>
    (function () {
      var fallback = setTimeout(hideSplash, 4000);

      function hideSplash() {
        clearTimeout(fallback);
        var splash = document.getElementById('app-splash');
        if (!splash || splash.classList.contains('splash--hidden')) return;
        splash.classList.add('splash--hidden');
        setTimeout(function () { splash.remove(); }, 450);
      }

      var check = setInterval(function () {
        if (window.App && window.App.isReady) {
          clearInterval(check);
          setTimeout(hideSplash, 150);
        }
      }, 100);
    })();
  </script>

</body>
</html>
