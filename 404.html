<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestion de Courses</title>
  <script>
    /**
     * Redirection SPA pour GitHub Pages
     * Redirige /gestion-courses/list/abc → /gestion-courses/?/list/abc
     * puis index.html restaure la vraie URL
     */
    (function () {
      var segment = 1; // nombre de segments du repo dans l'URL
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname +
        (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segment).join('/') +
        '/?p=' + encodeURIComponent(
          l.pathname.slice(1).split('/').slice(segment).join('/') +
          (l.search ? '&' + l.search.slice(1) : '') +
          l.hash
        )
      );
    })();
  </script>
</head>
<body>
  <p>Redirection en cours...</p>
</body>
</html>
