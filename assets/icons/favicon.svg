<svg xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 100 100"
  width="100" height="100">

  <!-- Fond arrondi -->
  <rect
    width="100" height="100" rx="22"
    fill="url(#grad)" />

  <!-- Icône panier simplifié -->
  <text
    x="50" y="68"
    text-anchor="middle"
    font-size="58"
    font-family="system-ui, sans-serif">
    🛒
  </text>

  <!-- Gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"
        style="stop-color:oklch(55% 0.22 250);stop-opacity:1" />
      <stop offset="100%"
        style="stop-color:oklch(60% 0.2 290);stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>